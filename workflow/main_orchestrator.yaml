main:
  params: [args]
  steps:
    - init:
        assign:
          - project_id: ${sys.get_env("GOOGLE_CLOUD_PROJECT_ID")}
          - location: "us-east1"
          - repository: "toolkit-retail-media"
    - get_current_time:
        assign:
          - now_ts: ${time.now()}
    - calc_yesterday:
        assign:
          - yesterday_ts: ${now_ts - 86400}
          - yesterday_date: ${text.split(time.format(yesterday_ts), "T")[0]}
          - ga4_suffix: ${text.replace(yesterday_date, "-", "")}
    - check_data_availability:
        call: googleapis.bigquery.v2.jobs.query
        args:
          projectId: ${project_id}
          body:
            useLegacySql: false
            query: ${"SELECT count(*) as total FROM analytics_123456789.events_" + ga4_suffix}
        result: bq_check
    - trigger_dataform:
        call: http.post
        args:
          url: ${"https://dataform.googleapis.com/v1beta1/projects/" + project_id + "/locations/" + location + "/repositories/" + repository + "/workflowInvocations"}
          auth:
            type: OAuth2
          body:
            compilationResult: ${"projects/" + project_id + "/locations/" + location + "/repositories/" + repository + "/compilationResults/main"}
        result: invocation_result
    - finish:
        return: ${invocation_result}
