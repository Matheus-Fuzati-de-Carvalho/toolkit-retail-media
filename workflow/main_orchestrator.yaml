main:
  params: [args]
  steps:
    - init:
        assign:
          - project_id: ${sys.get_env("GOOGLE_CLOUD_PROJECT_ID")}
          - location: "us-east1"
          - repository: "toolkit-retail-media"

    - get_dates:
        call: googleapis.bigquery.v2.jobs.query
        args:
          projectId: ${project_id}
          body:
            useLegacySql: false
            query: "SELECT FORMAT_DATE('%Y%m%d', DATE_SUB(CURRENT_DATE(), INTERVAL 1 DAY)) as suffix"
        result: bq_date

    - check_bq_data:
        call: googleapis.bigquery.v2.jobs.query
        args:
          projectId: ${project_id}
          body:
            useLegacySql: false
            query: ${"SELECT count(*) FROM analytics_123456789.events_" + bq_date.rows[0].f[0].v}
        result: bq_check

    - create_compilation:
        call: http.post
        args:
          url: ${"https://dataform.googleapis.com/v1beta1/projects/" + project_id + "/locations/" + location + "/repositories/" + repository + "/compilationResults"}
          auth:
            type: OAuth2
          body:
            gitCommitish: "main"
        result: compilation_res

    - trigger_dataform_run:
        call: http.post
        args:
          url: ${"https://dataform.googleapis.com/v1beta1/projects/" + project_id + "/locations/" + location + "/repositories/" + repository + "/workflowInvocations"}
          auth:
            type: OAuth2
          body:
            compilationResult: ${compilation_res.body.name}
        result: invocation_res

    - final_result:
        return: ${invocation_res.body}
