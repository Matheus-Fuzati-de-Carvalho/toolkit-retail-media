main:
  params: [args]
  steps:
    - init:
        assign:
          - project_id: ${sys.get_env("GOOGLE_CLOUD_PROJECT_ID")}
          - location: "us-east1"
          - repository: "toolkit-retail-media"

    - get_dates_from_bq:
        call: googleapis.bigquery.v2.jobs.query
        args:
          projectId: ${project_id}
          body:
            useLegacySql: false
            query: "SELECT FORMAT_DATE('%Y%m%d', DATE_SUB(CURRENT_DATE(), INTERVAL 1 DAY)) as suffix, FORMAT_DATE('%Y-%m-%d', DATE_SUB(CURRENT_DATE(), INTERVAL 1 DAY)) as date"
        result: bq_date_res

    - assign_vars:
        assign:
          - table_suffix: ${bq_date_res.rows[0].f[0].v}
          - yesterday_date: ${bq_date_res.rows[0].f[1].v}

    - check_if_table_exists:
        call: googleapis.bigquery.v2.jobs.query
        args:
          projectId: ${project_id}
          body:
            useLegacySql: false
            query: ${"SELECT count(*) FROM analytics_123456789.events_" + table_suffix}
        result: bq_check

    - trigger_dataform:
        call: http.post
        args:
          url: ${"https://dataform.googleapis.com/v1beta1/projects/" + project_id + "/locations/" + location + "/repositories/" + repository + "/workflowInvocations"}
          auth:
            type: OAuth2
          body:
            compilationResult: ${"projects/" + project_id + "/locations/" + location + "/repositories/" + repository + "/compilationResults/main"}
        result: df_res

    - final_result:
        return: ${df_res}
